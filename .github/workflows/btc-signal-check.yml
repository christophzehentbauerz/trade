name: BTC Signal Check

on:
  schedule:
    # Every 10 minutes — frequent enough for 1h candle strategy,
    # less GitHub runner pool pressure than every 5 min
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: btc-signal-check
  cancel-in-progress: true

jobs:
  check-signals:
    runs-on: ubuntu-latest
    # Hard timeout: if runner can't pick up job in 5 min, fail fast
    # rather than waiting the default 360 min — frees the slot for the next run
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore bot state
        uses: actions/cache/restore@v4
        with:
          path: /tmp/btc-smart-money-state.json
          key: bot-state-${{ github.run_id }}
          restore-keys: |
            bot-state-

      - name: Validate secrets
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "❌ TELEGRAM_BOT_TOKEN secret is not set"
            exit 1
          fi
          if [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "❌ TELEGRAM_CHAT_ID secret is not set"
            exit 1
          fi
          echo "✅ Secrets configured"

      - name: Signal Check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd telegram-bot
          node bot.js check

      - name: Save bot state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: /tmp/btc-smart-money-state.json
          key: bot-state-${{ github.run_id }}-${{ github.run_attempt }}
